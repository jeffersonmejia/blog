<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Contactar con Jefferson</title>

  	<!-- FONTS -->
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Poppins&family=Roboto:wght@400;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="contacto.css">
</head>
<body>
  <header>
    <nav>
      <p class="logo"></p>
      <a href="./feed.html">
				<p class="btn side">
					Feedback
				</p>
			</a>
			<a href="#">
				<p class="btn side">
					Contactar
				</p>
			</a>
			<a href="./index.html"><p class="btn">Inicio</p></a>
    </nav>
  </header>
  
  <main>
    <h1>
      Contáctame
    </h1>
    <form action="">
      <div class="container">
        
        <label for="name">
          Nombres
        </label>
        <input type="text" name="" id="" required placeholder="Ingrese su nombre">
  
        <label for="name">
          Apellidos
        </label>
        <input type="text" name="" id="" required placeholder="Ingrese su apellido">
  
        <label for="mail">
          Correo electrónico
        </label>
        <input type="email" name="" id="mail" required placeholder="Ingrese su correo electrónico">
      
        <label for="message">
          Mensaje
        </label>
        <textarea name="" id="" cols="10" rows="5" placeholder="Escriba su mensaje"></textarea>

        <input type="submit" value="Enviar">
      </div>
    </form>
  </main>
  <footer>
		<p>Jefferson Mejía</p>
	</footer>
</body>
</html>
